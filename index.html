<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VyapaarAI — SME Business OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=10" />
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div class="app">
  <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
    <div class="brand"><div class="brand-mark">V</div>VyapaarAI</div>
    <nav class="nav" id="nav">
      <button class="active" data-page="home"><span class="icon">⌂</span>Overview</button>
      <button data-page="records"><span class="icon">▤</span>Records</button>
      <button data-page="inventory"><span class="icon">◫</span>Inventory</button>
      <button data-page="leads"><span class="icon">◎</span>Leads</button>
      <button data-page="copilot"><span class="icon">✦</span>AI Copilot</button>
      <button data-page="integrations"><span class="icon">⌘</span>Integrations</button>
    </nav>
    <div class="sidebar-card"><strong>Business health: 82/100</strong><p>Two actions can improve cash flow and prevent a stock-out.</p><button type="button" data-action="business-health-advice">View AI advice</button></div>
  </aside>
  <button class="nav-scrim" id="navScrim" type="button" aria-label="Close navigation" tabindex="-1"></button>

  <main class="main" id="main-content">
    <div class="topbar">
      <button class="btn btn-outline mobile-menu" type="button" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false" onclick="toggleMenu()">☰</button>
      <div class="search topbar-search">
        <span>⌕</span>
        <input id="globalSearch" type="search" aria-label="Search business data" placeholder="Search invoices, customers, products, payments..." />
      </div>
      <div class="profile">
        <div class="avatar">RS</div><span><strong>Rajesh Sharma</strong><br><small>Sharma Garments</small></span>
      </div>
    </div>

    <div id="pageContent" class="page-content" aria-live="polite">
      <div class="page-loader" role="status">Loading…</div>
    </div>
  </main>
</div>

<div class="modal" id="connectModal" role="dialog" aria-modal="true" aria-labelledby="connect-title">
  <div class="modal-card">
    <div class="modal-head">
      <div><h2 id="connect-title">Connect your business</h2><p class="empty-small">Choose where your business data currently lives. VyapaarAI will organise it automatically.</p></div>
      <button class="close" type="button" aria-label="Close dialog" onclick="closeConnect()">×</button>
    </div>
    <div class="steps"><div class="step active"></div><div class="step active"></div><div class="step"></div></div>
    <div class="connect-list" id="connectList"><button class="connect-option selected">WhatsApp Business<br><small>Leads & orders</small></button><button class="connect-option selected">Tally<br><small>Accounts & invoices</small></button><button class="connect-option">Zoho<br><small>CRM & customers</small></button><button class="connect-option">Instagram<br><small>Social leads</small></button><button class="connect-option">Shopify<br><small>Orders & stock</small></button><button class="connect-option">Google Sheets<br><small>Existing trackers</small></button></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeConnect()">Cancel</button><button class="btn btn-brand" onclick="finishConnect()">Connect selected apps</button></div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="pages/renderers.js?v=8"></script>
<script src="pages/home.js"></script>
<script src="pages/records.js?v=3"></script>
<script src="pages/create-invoice.js?v=1"></script>
<script src="pages/inventory.js?v=4"></script>
<script src="pages/leads.js?v=3"></script>
<script src="pages/copilot.js"></script>
<script src="pages/integrations.js"></script>
<script src="app.js?v=6"></script>
</body>
</html>
